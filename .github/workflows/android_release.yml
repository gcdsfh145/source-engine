name: Android Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      game:
        description: 'Select the game to build (e.g., hl2, cstrike, entropyzero2)'
        required: true
        default: 'hl2'
      tag_name:
        description: 'Tag name for the release'
        required: false
        default: 'latest-android'

jobs:
  build-android-aarch64:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: 28.0.12433510

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfreetype6-dev libsdl2-dev libopenal-dev libcurl4-openssl-dev libpng-dev libjpeg-dev zlib1g-dev libopus-dev

      - name: Build Android aarch64
        run: |
          export NDK=$ANDROID_NDK_HOME
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin
          export PATH=$TOOLCHAIN:$PATH
          export CC=$TOOLCHAIN/aarch64-linux-android34-clang
          export CXX=$TOOLCHAIN/aarch64-linux-android34-clang++
          export STRIP=$TOOLCHAIN/llvm-strip
          export CFLAGS="-O2 -g0 -fno-lto -fomit-frame-pointer"
          export CXXFLAGS="-DNO_STD_REGEX=1 -Wno-error -O2 -g0 -fno-lto -fomit-frame-pointer"
          export LDFLAGS="-lunwind -static-libstdc++"
          
          # Use input game name
          SELECTED_GAME="${{ github.event.inputs.game }}"
          if [ -z "$SELECTED_GAME" ]; then
            SELECTED_GAME="hl2"
          fi
          echo "Building game: $SELECTED_GAME"

          # Configuration
          # Added --no-pkg-config to avoid host system freetype leakage if NDK/thirdparty is intended
          python3 ./waf configure -T release \
            --prefix=../android_build \
            --android=aarch64,host,34 \
            --target=../android_build/aarch64 \
            --disable-warns \
            --togles \
            --build-games=$SELECTED_GAME \
            --enable-opus
            
          # Build
          python3 ./waf 
          python3 ./waf install

      - name: Package artifacts
        run: |
          SELECTED_GAME="${{ github.event.inputs.game }}"
          if [ -z "$SELECTED_GAME" ]; then SELECTED_GAME="hl2"; fi
          cd ..
          zip -r source-engine-android-$SELECTED_GAME-aarch64.zip android_build/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name || 'manual-build' }}
          files: source-engine-android-*-aarch64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
